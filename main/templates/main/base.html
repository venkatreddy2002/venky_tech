{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Venky Tech{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'main/css/base.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="nav-logo">
            <img src="{% static 'main/images/logo.png' %}" alt="Logo">
            <span class="nav-brand-text">Venky Tech</span>
        </a>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'about' %}">About</a>
        </div>
        <div class="nav-actions">
            <a href="{% url 'contact' %}" class="btn btn-contact">Contact</a>
            <button class="btn btn-subscribe">Subscribe</button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-logo">
            <img src="{% static 'main/images/logo.png' %}" alt="Venky Tech Logo">
        </div>
        <p>&copy; 2026 Venky Tech. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const subscribeBtn = document.querySelector('.btn-subscribe');

            if (subscribeBtn) {
                subscribeBtn.addEventListener('click', function() {
                    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                    const upiLink = "upi://pay?pa=7995203602@ybl&pn=Venky%20Tech&cu=INR";
                    
                    if (isMobile) {
                        // Attempt to open PhonePe or any UPI app
                        window.location.href = upiLink;
                    } else {
                        // Redirect to the fake payment page on desktop
                        window.location.href = "{% url 'payment' %}";
                    }
                });
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
