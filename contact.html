<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Venky Tech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/main/css/base.css">
    <style>
        .contact-section { padding: 150px 0 100px; display: flex; justify-content: center; }
        .contact-card { background: var(--secondary); padding: 60px; border-radius: 12px; border: 1px solid var(--glass-border); max-width: 600px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .contact-card h1 { font-family: var(--font-heading); font-size: 3rem; color: var(--white); margin-bottom: 30px; text-align: center; }
        .contact-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { color: var(--text-secondary); font-weight: 500; }
        .form-group input, .form-group textarea { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px; border-radius: 4px; color: var(--text-primary); font-family: var(--font-main); outline: none; transition: border-color 0.3s; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
        .btn-submit { background-color: var(--accent); color: var(--primary); border: none; padding: 15px; border-radius: 4px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: transform 0.3s, background-color 0.3s; margin-top: 10px; }
        .btn-submit:hover { transform: translateY(-3px); background-color: var(--white); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="static/main/images/logo.png" alt="Logo">
            <span class="nav-brand-text">Venky Tech</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
        </div>
        <div class="nav-actions">
            <a href="contact.html" class="btn btn-contact">Contact</a>
            <button class="btn btn-subscribe">Subscribe</button>
        </div>
    </nav>
    <main>
        <div class="container contact-section">
            <div class="contact-card">
                <h1>Get in Touch</h1>
                <form class="contact-form" action="#">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Your Email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Send Message</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <div class="footer-logo">
            <img src="static/main/images/logo.png" alt="Venky Tech Logo">
        </div>
        <p>&copy; 2026 Venky Tech. All rights reserved.</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const subscribeBtn = document.querySelector('.btn-subscribe');
            if (subscribeBtn) {
                subscribeBtn.addEventListener('click', function() {
                    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                    const upiLink = "upi://pay?pa=7995203602@ybl&pn=Venky%20Tech&cu=INR";
                    if (isMobile) { window.location.href = upiLink; } else { window.location.href = "payment.html"; }
                });
            }
        });
    </script>
</body>
</html>
